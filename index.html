<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Suppress benign Vite WebSocket errors
      window.addEventListener('error', (e) => {
        if (e.message === 'Script error.' || e.message.includes('[vite] failed to connect to websocket')) {
          e.preventDefault();
          e.stopPropagation();
        }
      });
      window.addEventListener('unhandledrejection', (e) => {
        if (e.reason && e.reason.message && (
          e.reason.message.includes('WebSocket closed without opened') ||
          e.reason.message.includes('[vite] failed to connect to websocket')
        )) {
          e.preventDefault();
          e.stopPropagation();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
